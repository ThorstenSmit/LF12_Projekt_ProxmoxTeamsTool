# ── Lokaler Full-Stack (Frontend + Bridge auf einem Host) ────────────────────
# Setzt die beiden Tier-Dateien zu EINEM Compose-Projekt zusammen — praktisch
# fuer lokale Entwicklung / Single-Host-Tests. Der Cloudflare-Tunnel bleibt hier
# aus (er haengt am `tunnel`-Profil in docker-compose.backend.yml).
#
#   docker compose up --build            # Frontend (:8080) + Bridge, ohne Tunnel
#
# Getrennter Produktivbetrieb -> die Dateien einzeln nutzen:
#   Backend (auf der Proxmox-VM):
#     docker compose -f docker-compose.backend.yml --profile tunnel up -d --build
#   Frontend: i.d.R. Azure Static Web Apps (kein Container); sonst:
#     docker compose -f docker-compose.frontend.yml up -d --build
#
# Hinweis: In dieser kombinierten Variante laufen Frontend (:8080) und Bridge
# (127.0.0.1:3001) auf GETRENNTEN Origins. Zwei Wege, damit der Browser die
# Bridge erreicht:
#   a) In .env setzen:
#        API_BASE_URL=http://localhost:3001
#        CORS_ALLOWED_ORIGINS=http://localhost:8080
#   b) Oder einen Reverse-Proxy davorsetzen, der /api + /ws auf die Bridge routet
#      (dann API_BASE_URL leer lassen, BRIDGE_BIND ggf. anpassen).
#
# Benoetigt Docker Compose v2.20+ (fuer das `include:`-Element).
include:
  - docker-compose.backend.yml
  - docker-compose.frontend.yml
