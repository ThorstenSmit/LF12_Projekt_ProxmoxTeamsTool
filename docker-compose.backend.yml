# ── Backend-Stack: Bridge + Cloudflare-Tunnel ───────────────────────────────
# Läuft auf der Proxmox-VM, die das Tool steuert ("Schrödingers Docker": die
# VM hängt an genau der Proxmox-Installation, die die Bridge verwaltet).
#
# Starten:
#   nur die Bridge (z.B. hinter eigenem Reverse-Proxy mit TLS):
#     docker compose -f docker-compose.backend.yml up -d --build
#   Bridge + Tunnel (kein offener Inbound-Port nötig, empfohlen im Schulnetz):
#     docker compose -f docker-compose.backend.yml --profile tunnel up -d --build
#
# Config kommt aus .env. Backend-Vorlage: `cp .env.backend.example .env` (nur die
# Backend-Variablen, inkl. CORS_ALLOWED_ORIGINS + dem langen CF_TUNNEL_TOKEN —
# ohne Frontend-VITE_*). Das Runtime-File MUSS `.env` heissen, weil Compose
# daraus auch ${CF_TUNNEL_TOKEN}/${BRIDGE_BIND} interpoliert. Details: docs/deployment.md.

services:
  bridge:
    build:
      context: .
      dockerfile: bridge/Dockerfile
    image: pttool/bridge:dev
    container_name: pttool-bridge
    restart: unless-stopped
    # Config aus .env (Environment-Variablen). Damit liest die Bridge auch
    # CORS_ALLOWED_ORIGINS aus .env — leer = offen (same-origin), gesetzt = nur
    # diese Origins (z.B. die SWA-URL des Frontends), wenn Frontend und Bridge
    # auf verschiedenen Origins liegen.
    env_file: .env
    # Nur auf Loopback veröffentlicht: der Tunnel ist der eigentliche Ingress,
    # eine LAN-/Internet-Exposition entfällt. cloudflared erreicht die Bridge
    # ohnehin über das interne Compose-Netz als `bridge:3001` (kein Port nötig).
    # Für einen Reverse-Proxy auf einem ANDEREN Host BRIDGE_BIND in .env auf
    # z.B. 0.0.0.0:3001 setzen.
    ports:
      - "${BRIDGE_BIND:-127.0.0.1:3001}:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # ── Secrets statt Klartext-Env (empfohlen für Prod) ─────────────────────
    # Die Bridge liest jeden Wert via <NAME> ODER <NAME>_FILE. Für Secrets:
    #   1. den top-level `secrets:`-Block unten aktivieren (Dateien anlegen),
    #   2. hier die Secrets mounten + die *_FILE-Pfade setzen,
    #   3. die Klartext-Werte aus .env entfernen (die direkte Env-Var hat sonst
    #      Vorrang vor der Datei).
    # secrets:
    #   - azure_client_secret
    #   - proxmox_token_secret
    # environment:
    #   AZURE_CLIENT_SECRET_FILE: /run/secrets/azure_client_secret
    #   PROXMOX_TOKEN_SECRET_FILE: /run/secrets/proxmox_token_secret

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  # Macht die Bridge ohne offenen Inbound-Port erreichbar: cloudflared baut nur
  # eine AUSGEHENDE Verbindung (QUIC/HTTPS 443) zur Cloudflare-Edge auf. Nur aktiv
  # mit `--profile tunnel`, sonst übersprungen (so bleibt `docker compose up`
  # im kombinierten Stack ohne Token lauffähig).
  #
  # Setup:
  #   1. Cloudflare Dashboard -> Zero Trust -> Networks -> Tunnels -> Create
  #      -> Token nach .env als CF_TUNNEL_TOKEN kopieren.
  #   2. Im Dashboard eine Public-Hostname-Route anlegen: z.B.
  #      api.example.org -> http://bridge:3001 (NICHT hier — Token-/Remote-
  #      Managed-Tunnel haben keine lokale config.yml/ingress).
  #   3. Dieselbe URL als VITE_API_BASE_URL beim Frontend-Build + als
  #      CORS_ALLOWED_ORIGINS-Gegenstück (SWA-Origin) hinterlegen.
  cloudflared:
    # Für reproduzierbare Builds auf ein datiertes Tag pinnen (z.B.
    # cloudflare/cloudflared:2025.x.x) und per Renovate/Dependabot nachziehen —
    # `:latest` + --no-autoupdate kann sonst in Cloudflares deprecated-Bereich driften.
    image: cloudflare/cloudflared:latest
    container_name: pttool-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      # Token aus .env via Env-Var — NICHT als `--token` im command (landet sonst
      # in `ps`/`/proc/<pid>/cmdline`/`docker inspect`). `:-` (nicht `:?`), damit
      # ein Parsen ohne aktives Profil nicht fehlschlägt; fehlt der Token bei
      # aktivem --profile tunnel, bricht cloudflared zur Laufzeit klar ab.
      # (Ab cloudflared >= 2025.4.0 alternativ TUNNEL_TOKEN_FILE + Docker-Secret.)
      TUNNEL_TOKEN: "${CF_TUNNEL_TOKEN:-}"
      # Metrics-Server binden, damit der distroless-taugliche Healthcheck
      # (`cloudflared tunnel ready`) das /ready-Endpoint erreicht.
      TUNNEL_METRICS: "127.0.0.1:2000"
    # KEIN ports: — cloudflared ist rein ausgehend. Inbound-Ports wären falsch
    # und würden das Sicherheitsmodell des Tunnels aushebeln.
    depends_on:
      bridge:
        condition: service_healthy
    healthcheck:
      # Nativ + distroless-tauglich (cloudflared >= 2024.11, PR #1135): kein
      # wget/curl im Image nötig. Metrics-Adresse muss zu TUNNEL_METRICS passen.
      test: ["CMD", "cloudflared", "--metrics", "127.0.0.1:2000", "tunnel", "ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # ── Hardening (alles unbedenklich für cloudflared) ──────────────────────
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

# ── Secrets (optional, für Prod statt Klartext-Env) ─────────────────────────
# Lege je Secret eine Datei mit dem reinen Wert an (z.B.
# ./secrets/azure_client_secret) und aktiviere die `secrets:`-Blöcke oben am
# bridge-Service. Gilt für beide Tiers: <NAME> (Env) ODER <NAME>_FILE (Datei).
# secrets:
#   azure_client_secret:
#     file: ./secrets/azure_client_secret
#   proxmox_token_secret:
#     file: ./secrets/proxmox_token_secret
