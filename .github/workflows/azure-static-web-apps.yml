# Deploy des Frontends auf Azure Static Web Apps.
#
# Inert, bis diese GitHub-Konfiguration gesetzt ist (Settings -> Secrets and
# variables -> Actions):
#   Secret    AZURE_STATIC_WEB_APPS_API_TOKEN  -> Deployment-Token der SWA-Ressource
#   Variable  VITE_AZURE_CLIENT_ID             -> Entra Client-ID  (oeffentlich)
#   Variable  VITE_AZURE_TENANT_ID             -> Entra Tenant-GUID (oeffentlich)
#   Variable  VITE_API_BASE_URL                -> z.B. https://api.example.org (Tunnel-URL)
#
# Wir bauen bewusst SELBST (npm run build) statt via Oryx, damit die VITE_*-Werte
# deterministisch zur Build-Zeit eingebacken werden, und deployen dann das fertige
# dist/ mit skip_app_build. Siehe docs/deployment.md Schritt 4.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # SWA-Action kommentiert Preview-URLs an PRs

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (VITE_* werden hier eingebacken)
        run: npm run build
        env:
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Fertiges dist/ hochladen, NICHT erneut bauen (sonst gehen die
          # VITE_*-Werte verloren). staticwebapp.config.json liegt in dist/.
          app_location: "dist"
          output_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request (Preview-Umgebung aufraeumen)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
